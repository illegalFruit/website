<!DOCTYPE html>
<html>
    <head>
        <title>The Bread is Delicious</title>
        <link rel="icon" type="image/x-icon" href="./img/bread.ico">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <style>
            @font-face {
                font-family: 'clearsans-regular';
                src: url('./font/clear-sans/ClearSans-Regular.ttf');
            }
            @font-face {
                font-family: 'clearsans-italic';
                src: url('./font/clear-sans/ClearSans-Italic.ttf');
            }
            @font-face {
                font-family: 'clearsans-bold';
                src: url('./font/clear-sans/ClearSans-Bold.ttf');
            }
            @font-face {
                font-family: 'clearsans-bolditalic';
                src: url('./font/clear-sans/ClearSans-BoldItalic.ttf');
            }
            @font-face {
                font-family: 'clearsans-light';
                src: url('./font/clear-sans/ClearSans-Light.ttf');
            }
            @font-face {
                font-family: 'clearsans-thin';
                src: url('./font/clear-sans/ClearSans-Thin.ttf');
            }    
            html{
                background-color: #faf0e6;
                opacity: 1;
                background-image:  radial-gradient(rgba(250,0,0,1) 1.4000000000000001px, transparent 1.4000000000000001px), radial-gradient(rgba(250,0,0,1) 1.4000000000000001px, #faf0e6 1.4000000000000001px);
                background-size: 56px 56px;
                background-position: 0 0,28px 28px;
            }
            body{
                font-family: 'clearsans-regular';
                margin: 0px;
                padding: 69px 0px 69px 0px;
            }
            .center{
                display: flex;
                justify-content: center; /* Centers horizontally */
            }
            .vbox{
                display: flex;
                flex-direction: column;
                margin: 1;
            }
            .content{
                background-color: linen;
                border: 03px double red;
                width: 800px;
                height: 690px;
                overflow:auto;
                overflow-y: hidden;
                
            }
            li{
                padding: 2px;
                font-size: 24px;
                color: blue;                
                color: linen;
                -webkit-text-stroke: 1px red;
            }
            .date{
                margin-top: 8px;
                -webkit-text-stroke: 1px rgb(255, 132, 132);
                font-size: 16px;
                color: linen;
                margin: 4px;
                margin-left: auto;
            }
            a {
                color: blue;
                -webkit-text-stroke: 0px red;
                text-decoration: none;
                margin-left: 30px;
                font-size: 30px;
            }
            a:visited{
                color: rgb(120, 148, 240);
            }
            .updated {
                font-family: 'clearsans-italic';
                color: rgba(0, 0, 0, 0.5);
            }
            .hbox{
                display: flex;
                flex-direction: row;
                align-items: flex-end;
            }
            .spacer{
                justify-content: space-between;
            }
            .hex{
                position: absolute;
                right: 24px;
                top: -180px;
            }
            .title{
                font-size: 42px;
                font-family: 'clearsans-thin';
                text-decoration: none;
                color: red;
                position: relative;
                margin-left: 0px;
            }
            .title:visited{
                text-decoration: none;
                color: red;
            }
            .wrapper-hex{
                position: relative;
            }
            .unavailable, .unavailable:visited{
                color: grey;
                text-decoration: none;
                font-family: 'clearsans-thin';
            }
            .entry{
                display: flex;
                flex-direction: row;
                align-items: center;
                background-color: rgb(255, 236, 210);
                justify-content: flex-start;
                white-space: nowrap;
            }
            .spacious{
                min-height: 60px;
            }
            .footer{
                width: 400px;
                margin-top: 10px;
                display: flex;
                justify-content: center;
                margin-bottom: 100px;
            }
            .contact{
                color: red;
                text-decoration: none;
                font-size: 22px;
            }
            .contact:visited{
                color: red; 
            }
            .discord-wrapper{
                color: red;
                font-size: 22px;
                margin-left: 30px;
                display: relative;
                min-width: 100px;
            }
            #ty{
                position: absolute;
                opacity: 0%;
            }
            #ty2{
                position: absolute;
                pointer-events: none;
            }
            .discord-wrapper:hover{
                :nth-child(1){animation: show .5s forwards;}   
                :nth-child(2){animation: hide .5s forwards;}
            }
            @keyframes show {
            0% {opacity: 0%}
            100% {opacity: 100%}}
            @keyframes hide {
            0% {opacity: 100%}
            100% {opacity: 0%}}   
            .tag-wrapper{
                display: grid;
                position: relative;
                grid-template-columns: auto auto auto;
                gap: 2px;
                align-self: end;
            }
            .tag-base{
                border-radius: 15px;
                font-size: 12px;
                text-align: center;
                cursor: default;
            }
            .tag-wip{
                width: 40px;
                color: black;
                background-color: rgba(255, 166, 0, 0.589);
            }
            .tag-edit{
                width: 20px;
                color: black;
                background-color: rgba(255, 166, 0, 0.589);
            }
            /* Apply plain to every nth element */
            .entry:nth-child(even){
                background-color: transparent;
            }
            .wip{
                background: #ff0000;
                background: linear-gradient(90deg,rgba(255, 0, 0, 0.5) 0%, rgba(255, 0, 0, 1) 40%, rgba(255, 0, 0, 1) 60%, rgba(255, 0, 0, 0.5) 100%);
                text-align: center;
                color: white;
                border: 1px double red;
                font-size: 22px;
            }
            .icon-last-fm{
                mask: url('img/svg2/lastfm-brands-solid-full.svg');
                height: 100%;
            }
            .icon-youtube{
                mask: url('img/svg2/youtube-brands-solid-full.svg');
                height: 100%;
            }
            .icon-steam{
                mask: url('img/svg2/steam-brands-solid-full.svg');
                height: 100%;
            }
            .icon-discord{
                mask: url('img/svg2/discord-brands-solid-full.svg');
                height: 100%;
            }
            .icon-twitter{
                mask: url('img/svg2/x-twitter-brands-solid-full.svg');
                height: 100%;
            }
            .icon-instagram{
                mask: url('img/svg2/instagram-brands-solid-full.svg');
                height: 100%;
            }
            .icon{
                min-width: 45px;
                height: 45px;
                border-bottom: solid 2px red;
                border-radius: 4px;
                background-color: linen;
            }
            #twitch{
                background-color: linen;
            }
            .entry-image{
                background-image: url('img/prof4.png');
                opacity: 0.2;
                position: fixed;
                width: 100;
                height: 200px;
            }
            .bot-fade{
                width: 805px;
                height: 200px;
                position: absolute;
                display:inline-flex;
                background-color: rgba(255, 0, 0, 0.205);
            }
        </style>
    </head>


    <body class="center">
        <!-- <a href="https://www.last.fm/user/floor2"><img src="https://lastfm-recently-played.vercel.app/api?user=floor2" height="auto" width="350px"/></a> -->
        <div class="vbox">
            <div class="wip">This is a work in progress, okay? Be nice. (✿◠‿◠)<br>Below are ideas for entries that're yet to exist!</div>
            <div class="hbox spacer">
                <a href="/" class="title">Home</a>
                <div class="updated">last updated WHENEVER HAHA</div>
            </div>
            <div class="content vbox">
                <div style="background-color: pink; flex-grow:1;">top</div>
            </div>
            <div class="">
                
            </div>
        </div>
    </body>
</html>
